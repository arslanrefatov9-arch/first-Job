<!DOCTYPE html>
<html>
<head>
    <title>Мой стильный сайт</title>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #38bdf8;
            font-size: 40px;
        }

        p {
            font-size: 20px;
        }

        button {
            background-color: #22c55e;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #16a34a;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <h1>Мой крутой сайт 🚀</h1>
    <p>Я уже учусь программировать!</p>

    <button onclick="alert('Красиво получилось 😎')">
        Нажми меня
    </button>

</body>
</html>
